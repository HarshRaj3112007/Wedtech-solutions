{% extends "base.html" %}
{% block title %}Edit City Factor — Admin{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto px-4 py-8">
    <div class="card p-8">
        <h1 class="text-2xl font-bold text-gray-900 mb-2">Edit City Factor</h1>
        <p class="text-gray-500 mb-6">{{ factor.city }} — {{ factor.cost_head }}</p>

        <form method="POST">
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Factor</label>
                <input type="number" name="factor" value="{{ factor.factor }}" step="0.05" min="0.5" max="3.0" class="input-field">
                <p class="text-xs text-gray-400 mt-1">1.0 = no adjustment, 1.2 = +20% premium, 0.8 = 20% discount</p>
            </div>
            <div class="flex gap-3">
                <button type="submit" class="btn-primary">Save</button>
                <a href="{{ url_for('admin.city_factors') }}" class="btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
